<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benjo's Slim Monitor v18.0</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; margin: 0; padding: 0;
            background: linear-gradient(135deg, #00308F, #001f3f, #007aff);
            overflow-x: hidden;
        }
        
        .dashboard-container { padding: 10px; min-height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; }
        
        .dashboard { 
            display: flex; flex-direction: column; 
            width: 100%; max-width: 360px; 
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(50px) saturate(200%); 
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            color: white;
            padding-bottom: 20px;
        }
        
        .macos-header { display: flex; gap: 8px; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); align-items: center; }
        .stoplight { width: 12px; height: 12px; border-radius: 50%; border: none; padding: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; font-weight: bold; transition: color 0.2s; }
        .sl-red { background: #ff5f56; }
        .sl-red:hover { color: rgba(0,0,0,0.5); }
        .sl-yellow { background: #ffbd2e; }
        .sl-yellow:hover { color: rgba(0,0,0,0.5); }
        .sl-green { background: #27c93f; }
        .sl-green:hover { color: rgba(0,0,0,0.5); }
        
        .top-section { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); 
            text-align: center;
        }
        .ph-time { font-size: 5vh; font-weight: 800; color: #ffffff; margin: 0; line-height: 1.2; }
        .ph-date { font-size: 1.8vh; color: rgba(255,255,255,0.6); font-weight: 600; margin-bottom: 15px; }
        
        .ticket-counter {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px; width: 100%; padding: 10px; display: flex; justify-content: space-around; align-items: center;
            margin-bottom: 15px;
        }
        .tc-label { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 800; text-transform: uppercase; }
        .tc-count { font-size: 32px; font-weight: 800; color: #34c759; line-height: 1; }
        .tc-btn { 
            background: #ffffff; color: #007aff; border: none; border-radius: 6px; 
            width: 30px; height: 30px; font-size: 20px; font-weight: 800; cursor: pointer; 
        }

        .ticket-tracker-area { 
            background: rgba(0, 0, 0, 0.2); border-radius: 18px; 
            display: flex; flex-direction: column; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; margin-top: 5px;
        }
        .tt-header { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tt-input-group { display: flex; gap: 8px; align-items: center; }
        .tt-input { 
            flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            color: white; border-radius: 8px; padding: 8px; outline: none; font-size: 14px; min-width: 0;
        }

        .toggle-container {
            display: flex; align-items: center; 
            background: rgba(120, 120, 128, 0.4); 
            border-radius: 8px; cursor: pointer; position: relative; 
            width: 72px; height: 32px; user-select: none; flex-shrink: 0;
            transition: background 0.2s ease;
            border: 0.5px solid rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .toggle-container:has(.toggle-checkbox:checked) { background: #007aff; }
        .toggle-checkbox { display: none; }
        .toggle-knob {
            position: absolute; top: 2px; left: 2px; 
            width: 34px; height: 28px;
            background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%);
            border-radius: 6px; 
            transition: transform 0.25s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,1);
            z-index: 2;
        }
        .toggle-checkbox:checked + .toggle-knob { transform: translateX(34px); }
        .toggle-label {
            width: 100%; height: 100%; display: flex; 
            justify-content: space-between; align-items: center;
            font-size: 10px; font-weight: 800; color: #ffffff; z-index: 1; 
            padding: 0 8px; letter-spacing: 0.5px;
        }
        .label-24h, .label-2h { transition: opacity 0.2s; }
        .toggle-checkbox:not(:checked) ~ .toggle-label .label-2h { opacity: 0.2; }
        .toggle-checkbox:checked ~ .toggle-label .label-24h { opacity: 0.2; }

        .tt-add-btn { background: #34c759; border: none; color: white; border-radius: 8px; height: 32px; padding: 0 12px; cursor: pointer; font-weight: bold; flex-shrink: 0; }
        
        .tt-list { max-height: 180px; overflow-y: auto; padding: 10px; }
        .tt-item { 
            background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; 
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: background 0.2s;
        }
        .tt-item:active { background: rgba(255,255,255,0.3); }
        .tt-item-left { display: flex; align-items: center; gap: 10px; }
        .tt-item-num { font-weight: 800; font-size: 14px; color: #007aff; }
        .tt-item-timer { font-family: "SF Mono", monospace; font-size: 14px; color: #ffffff; }

        .main-content { display: flex; flex-direction: column; padding: 15px; gap: 15px; }
        .card { 
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 18px; padding: 15px; text-align: center; 
            display: flex; flex-direction: column; align-items: center;
            transition: opacity 0.5s ease;
        }

        .label-input { background: transparent; border: none; color: #ffffff; font-size: 18px; text-align: center; width: 100%; font-weight: 800; text-transform: uppercase; outline: none; margin-bottom: 5px; }
        .countdown { font-size: 28px; font-family: "SF Mono", monospace; color: #ffffff; font-weight: 700; }
        .timer-display { color: #ffffff; font-size: 32px; display: none; font-weight: 800; }

        .alarm-active { animation: blinker 0.8s linear infinite; background: rgba(255, 59, 48, 0.6) !important; }
        @keyframes blinker { 50% { opacity: 0.6; } }

        .stop-btn, .timer-stop-btn { border: none; border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        .stop-btn { background: #ff3b30; color: white; display: none; }
        .timer-stop-btn { background: #555; color: white; display: none; }

        input[type="datetime-local"] { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 14px; border-radius: 8px; padding: 5px; width: 100%; text-align: center; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="dashboard">
        <header class="macos-header">
            <button class="stoplight sl-red" onclick="shiftReset()" title="Shift Reset & Reload">×</button>
            <button class="stoplight sl-yellow" onclick="resetTickets()" title="Reset Counter">−</button>
            <button class="stoplight sl-green" onclick="copyAttendance()" title="Copy Attendance">+</button>
        </header>

        <section class="top-section">
            <div class="ph-time" id="clock">00:00:00</div>
            <div class="ph-date" id="date">Loading...</div>
            
            <div class="ticket-counter">
                <span class="tc-label">Closed</span>
                <button class="tc-btn" onclick="updateTickets(-1)">-</button>
                <div class="tc-count" id="ticket-count">0</div>
                <button class="tc-btn" onclick="updateTickets(1)">+</button>
            </div>

            <div class="ticket-tracker-area">
                <div class="tt-header">
                    <div class="tc-label" style="margin-bottom:8px;">Snoozed Ticket Tracker</div>
                    <div class="tt-input-group">
                        <input type="text" id="tt-input" class="tt-input" placeholder="Ticket #" onkeydown="if(event.key==='Enter') addLiveTicket()">
                        
                        <label class="toggle-container" title="24H (Gray) vs 2H (Blue)">
                            <input type="checkbox" id="tt-duration-toggle" class="toggle-checkbox">
                            <div class="toggle-knob"></div>
                            <div class="toggle-label">
                                <span class="label-24h">24H</span>
                                <span class="label-2h">2H</span>
                            </div>
                        </label>

                        <button class="tt-add-btn" onclick="addLiveTicket()">ADD</button>
                    </div>
                </div>
                <div class="tt-list" id="tt-list"></div>
            </div>
        </section>

        <main class="main-content">
            <div class="card" id="card-0">
                <input class="label-input" value="1st Break">
                <input type="datetime-local" class="time-picker">
                <div class="countdown" id="count-0">--:--:--</div>
                <div class="timer-display" id="timer-0">30:00</div>
                <button class="stop-btn" id="stop-0" onclick="handleStop(0, 30)">STOP ALARM</button>
                <button class="timer-stop-btn" id="tstop-0" onclick="stopTimer(0)">STOP TIMER</button>
            </div>
            
            <div class="card" id="card-1">
                <input class="label-input" value="2nd Break">
                <input type="datetime-local" class="time-picker">
                <div class="countdown" id="count-1">--:--:--</div>
                <div class="timer-display" id="timer-1">30:00</div>
                <button class="stop-btn" id="stop-1" onclick="handleStop(1, 30)">STOP ALARM</button>
                <button class="timer-stop-btn" id="tstop-1" onclick="stopTimer(1)">STOP TIMER</button>
            </div>
            
            <div class="card" id="card-2">
                <input class="label-input" value="End Shift">
                <input type="datetime-local" class="time-picker">
                <div class="countdown" id="count-2">--:--:--</div>
                <button class="stop-btn" id="stop-2" onclick="handleStop(2, 0)">STOP ALARM</button>
            </div>
        </main>
    </div>
</div>

<script>
    let alarmsTriggered = [false, false, false];
    let fiveMinWarningTriggered = [false, false, false];
    let activeTimers = {}; 
    let audioCtx = null;
    let ticketsClosed = 0;
    let ticketIntervals = {}; 

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    document.addEventListener('click', initAudio, { once: true });

    function getETDate() {
        return new Date().toLocaleDateString("en-US", {timeZone: "America/New_York", month: 'long', day: 'numeric', year: 'numeric'});
    }

    function shiftReset() {
        const items = document.querySelectorAll('.tt-item');
        let reportText = "Snoozed Tickets Report:\n";
        
        if (items.length === 0) {
            reportText += "No tickets currently snoozed.";
        } else {
            items.forEach(item => {
                const num = item.dataset.num;
                const timerText = item.querySelector('.tt-item-timer').innerText;
                reportText += `Ticket #${num} | Time Remaining: ${timerText}\n`;
            });
        }

        navigator.clipboard.writeText(reportText).then(() => {
            alert("Shift report copied to clipboard. Resetting now...");
            location.reload();
        }).catch(err => {
            console.error("Report copy failed", err);
            location.reload();
        });
    }

    function copyAttendance() {
        const etDateStr = getETDate();
        const attendanceText = `Attendance:
Shift date: ${etDateStr}
 
Name: Ben Joseph Barliso
Logged in: 9:00 AM
Good morning!
${etDateStr} 
Time In 9AM`;

        navigator.clipboard.writeText(attendanceText).then(() => {
            const btn = document.querySelector('.sl-green');
            btn.innerText = "✓";
            setTimeout(() => btn.innerText = "+", 2000);
        });
    }

    function updateTickets(change) {
        ticketsClosed = Math.max(0, ticketsClosed + change);
        document.getElementById('ticket-count').innerText = ticketsClosed;
        try {
            localStorage.setItem('ticketsClosed', ticketsClosed.toString());
        } catch(e) { console.error("Could not save tickets", e); }
    }

    function resetTickets() {
        if (confirm("Reset ticket counter to zero?")) {
            ticketsClosed = 0;
            document.getElementById('ticket-count').innerText = "0";
            try {
                localStorage.setItem('ticketsClosed', "0");
            } catch(e) { console.error("Could not reset tickets", e); }
        }
    }

    function saveTicketsToStorage() {
        const list = [];
        document.querySelectorAll('.tt-item').forEach(item => {
            list.push({ num: item.dataset.num, expiry: parseInt(item.dataset.expiry) });
        });
        try {
            localStorage.setItem('snoozedTickets', JSON.stringify(list));
        } catch(e) { console.error("Could not save list", e); }
    }

    function addLiveTicket() {
        const input = document.getElementById('tt-input');
        const toggle = document.getElementById('tt-duration-toggle');
        const num = input.value.trim();
        if(!num) return;

        const existing = document.querySelector(`.tt-item[data-num="${num}"]`);
        if (existing) {
            if (ticketIntervals[num]) clearInterval(ticketIntervals[num]);
            existing.remove();
        }

        const hours = toggle.checked ? 2 : 24;
        const expiry = Date.now() + (hours * 60 * 60 * 1000);
        createTicketItem(num, expiry, true);
        input.value = '';
    }

    function createTicketItem(num, expiry, isNew) {
        const list = document.getElementById('tt-list');
        const item = document.createElement('div');
        item.className = 'tt-item';
        item.dataset.num = num;
        item.dataset.expiry = expiry;
        
        item.innerHTML = `
            <div class="tt-item-left">
                <button class="stoplight sl-red" title="Delete">×</button>
                <span class="tt-item-num">#${num}</span>
            </div>
            <span class="tt-item-timer">--:--:--</span>
        `;
        
        list.prepend(item);
        if(isNew) saveTicketsToStorage();

        const closeBtn = item.querySelector('.sl-red');
        const timerText = item.querySelector('.tt-item-timer');
        let beeped = false;
        
        ticketIntervals[num] = setInterval(() => {
            const diff = expiry - Date.now();
            if (diff <= 0) {
                if (!beeped && isNew) { playSpecificBeeps(2); beeped = true; }
                timerText.innerText = "DONE";
                item.classList.add('alarm-active');
            } else {
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                timerText.innerText = `${h}:${m}:${s}`;
            }
        }, 1000);

        item.onclick = async (e) => {
            if (e.target === closeBtn) return;
            try {
                await navigator.clipboard.writeText(num);
                const originalText = timerText.innerText;
                timerText.innerText = "COPIED!";
                setTimeout(() => timerText.innerText = originalText, 1000);
            } catch (err) { console.error('Copy failed', err); }

            if (item.classList.contains('alarm-active')) {
                clearInterval(ticketIntervals[num]);
                delete ticketIntervals[num];
                item.remove();
                saveTicketsToStorage();
            }
        };

        closeBtn.onclick = (e) => {
            e.stopPropagation(); 
            clearInterval(ticketIntervals[num]);
            delete ticketIntervals[num];
            item.remove();
            saveTicketsToStorage();
        };
    }

    function playSpecificBeeps(times) {
        initAudio();
        let c = 0;
        const interval = setInterval(() => {
            if (c >= times * 2) { clearInterval(interval); return; } 
            if (c % 2 === 0) { 
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(900, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            }
            c++;
        }, 400);
    }

    function getManilaTime() { return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Manila"})); }

    function handleStop(index, minutes) {
        document.getElementById(`card-${index}`).classList.remove('alarm-active');
        document.getElementById(`stop-${index}`).style.display = 'none';
        
        initAudio();

        if (index === 2) {
            const msg = new SpeechSynthesisUtterance("Good job today, Benjo! Don't forget to screenshot Hub Staff.");
            window.speechSynthesis.speak(msg);

            const etDateStr = getETDate();
            const signOffText = `Good night!
${etDateStr} 
Time out 6PM`;
            navigator.clipboard.writeText(signOffText);
        } else if (minutes > 0) {
            const breakName = (index === 0) ? "1st break" : "2nd break";
            const msg = new SpeechSynthesisUtterance("Enjoy your " + breakName + ", Benjo. Timer started.");
            window.speechSynthesis.speak(msg);
            startTimer(index, minutes * 60);
        }
    }

    function startTimer(index, seconds) {
        document.getElementById(`timer-${index}`).style.display = 'block';
        document.getElementById(`count-${index}`).style.display = 'none';
        document.getElementById(`tstop-${index}`).style.display = 'block';
        activeTimers[index] = getManilaTime().getTime() + (seconds * 1000);
    }

    function stopTimer(index) {
        delete activeTimers[index];
        const card = document.getElementById(`card-${index}`);
        card.classList.remove('alarm-active');
        document.getElementById(`timer-${index}`).style.display = 'none';
        document.getElementById(`count-${index}`).style.display = 'block';
        document.getElementById(`tstop-${index}`).style.display = 'none';
        
        initAudio();
        if (index === 0 || index === 1) {
            const msg = new SpeechSynthesisUtterance("Welcome back Benjo! Please don't forget to start Hubstaff.");
            window.speechSynthesis.speak(msg);
            card.style.display = 'none';
        }
    }

    function updateClocks() {
        const now = getManilaTime();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric', month: 'short' });

        [0, 1, 2].forEach(index => {
            if (activeTimers[index]) {
                const diff = activeTimers[index] - getManilaTime().getTime();
                if (diff <= 0) {
                    document.getElementById(`timer-${index}`).innerText = "0:00";
                    delete activeTimers[index];
                    document.getElementById(`card-${index}`).classList.add('alarm-active');
                    playSpecificBeeps(5); 
                } else {
                    let s = Math.ceil(diff / 1000);
                    document.getElementById(`timer-${index}`).innerText = `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;
                }
                return;
            }
            const picker = document.querySelectorAll('.time-picker')[index];
            const countDisp = document.getElementById(`count-${index}`);
            if (!picker.value || countDisp.style.display === 'none') return;
            const diff = new Date(picker.value) - now;
            if (diff > 0 && diff <= 300000 && !fiveMinWarningTriggered[index]) {
                if (index < 2) window.speechSynthesis.speak(new SpeechSynthesisUtterance("Benjo, 5 minutes to break. Wrap up your ticket."));
                fiveMinWarningTriggered[index] = true;
            }
            if (diff > 0) {
                const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                countDisp.innerText = `${h}:${m}:${s}`;
            } else if (!alarmsTriggered[index]) {
                document.getElementById(`card-${index}`).classList.add('alarm-active');
                document.getElementById(`stop-${index}`).style.display = 'block';
                playSpecificBeeps(5);
                alarmsTriggered[index] = true;
            }
        });
    }

    setInterval(updateClocks, 1000);
    
    function applyDefaults() {
        const now = getManilaTime();
        const setT = (h, m) => { 
            let d = new Date(now); d.setHours(h, m, 0, 0);
            if (h >= 22 && now.getHours() < 12) d.setDate(d.getDate() - 1); 
            else if (h < 12 && now.getHours() >= 12) d.setDate(d.getDate() + 1);
            return new Date(d - d.getTimezoneOffset()*60000).toISOString().slice(0, 16);
        };
        document.querySelectorAll('.time-picker').forEach((p, i) => { 
            // UPDATED TIMES
            const defs = [setT(1, 30), setT(3, 30), setT(8, 0)];
            if(!p.value) p.value = defs[i]; 
        });
    }

    window.onload = () => {
        applyDefaults();
        updateClocks();
        try {
            const savedCount = localStorage.getItem('ticketsClosed');
            if (savedCount !== null) {
                ticketsClosed = parseInt(savedCount);
                document.getElementById('ticket-count').innerText = ticketsClosed;
            }
            const savedItems = JSON.parse(localStorage.getItem('snoozedTickets')) || [];
            savedItems.forEach(t => createTicketItem(t.num, t.expiry, false));
        } catch (e) { console.error("Storage Access Denied", e); }
    };
</script>
</body>
</html>
